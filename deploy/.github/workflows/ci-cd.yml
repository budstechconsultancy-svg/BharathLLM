name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          echo "SHA_TAG=${{ secrets.REGISTRY_URL }}/bharatllm-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=${{ secrets.REGISTRY_URL }}/bharatllm-api:latest" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile.api
          push: true
          tags: |
            ${{ steps.tags.outputs.SHA_TAG }}
            ${{ steps.tags.outputs.LATEST_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    steps:
      - name: Setup Kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Staging
        run: |
          kubectl set image deployment/bharatllm-api \
            api=${{ secrets.REGISTRY_URL }}/bharatllm-api:${{ github.sha }} -n staging
