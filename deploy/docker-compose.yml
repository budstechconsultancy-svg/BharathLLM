version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: ./deploy/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE}
      - DEPLOYMENT_STATE=${DEPLOYMENT_STATE}
    depends_on:
      - redis
      - qdrant

  worker-cpu:
    build:
      context: ..
      dockerfile: ./deploy/Dockerfile.worker
    command: /workers/start_worker_cpu.sh
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - CUDA_VISIBLE_DEVICES=""
    depends_on:
      - redis
      - qdrant

  worker-gpu:
    build:
      context: ..
      dockerfile: ./deploy/Dockerfile.worker
    command: /workers/start_worker_gpu.sh
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - redis
      - qdrant

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.9.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  redis_data:
  qdrant_data:
